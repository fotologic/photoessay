<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhotoEssay · Image probe</title>
<style>
  body{ font-family:"Inter",system-ui,sans-serif; max-width:860px; margin:0 auto; padding:30px 24px 80px; color:#2a2a2a; background:#fafafa; line-height:1.5; }
  h1{ font-size:19px; margin:0 0 4px; }
  .sub{ color:#777; font-size:13px; margin-bottom:22px; }
  button{ font-family:inherit; font-weight:600; font-size:14px; border:0; border-radius:10px; padding:11px 18px; cursor:pointer; background:#2b2b30; color:#fff; }
  button:hover{ background:#1a1a1e; }
  #log{ margin-top:24px; }
  .row{ background:#fff; border:1px solid #e6e6e6; border-radius:10px; padding:14px 16px; margin-bottom:10px; font-size:13px; }
  .row h3{ margin:0 0 6px; font-size:13px; }
  .k{ color:#888; }
  .ok{ color:#1a7a3a; font-weight:600; }
  .bad{ color:#b01a2f; font-weight:600; }
  .warn{ color:#a06a00; font-weight:600; }
  .thumb{ height:70px; width:auto; border-radius:5px; border:1px solid #ddd; margin-top:8px; display:block; }
  code{ background:#f0f0f0; padding:1px 5px; border-radius:4px; font-size:12px; word-break:break-all; }
  .summary{ background:#fff; border:2px solid #2b2b30; border-radius:10px; padding:16px 18px; margin-bottom:20px; font-size:14px; display:none; }
  pre{ background:#f4f4f4; padding:10px; border-radius:6px; overflow-x:auto; font-size:11px; }
</style>
</head>
<body>
<h1>PhotoEssay · Image resolution probe</h1>
<div class="sub">Reads the essay Doc, finds every inline image, and tests whether each can be turned into usable pixels. Nothing is composed or written.</div>
<button onclick="signIn()">Sign in and probe</button>
<div class="summary" id="summary"></div>
<div id="log"></div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID='1061675050152-1b4mn398mth6a3hfim1o0p8uktpqokr3.apps.googleusercontent.com';
const SCOPE='https://www.googleapis.com/auth/drive.readonly https://www.googleapis.com/auth/documents.readonly';
const DOC_ID='1sczmbkNbIdNsigfxWK9nDVqB-bHGkYr5gMkBTBXCud8';
const DOCS='https://docs.googleapis.com/v1/documents/';
let token=null, tokenClient=null;

window.addEventListener('load',()=>{
  const t=setInterval(()=>{
    if(window.google&&google.accounts){
      clearInterval(t);
      tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:CLIENT_ID, scope:SCOPE,
        callback:async r=>{ if(r.error){ log('<span class="bad">Sign-in refused: '+r.error+'</span>'); return; } token=r.access_token; probe(); }
      });
    }
  },100);
});
function signIn(){ if(!tokenClient){ log('Still loading Google sign-in, try again in a moment.'); return; } tokenClient.requestAccessToken({prompt:''}); }
function log(html){ const d=document.createElement('div'); d.className='row'; d.innerHTML=html; document.getElementById('log').appendChild(d); return d; }

async function probe(){
  document.getElementById('log').innerHTML='';
  let doc;
  try{
    const r=await fetch(DOCS+DOC_ID, {headers:{Authorization:'Bearer '+token}});
    if(!r.ok){ log('<span class="bad">Could not read the Doc: '+r.status+'</span> '+(await r.text()).slice(0,200)); return; }
    doc=await r.json();
  }catch(e){ log('<span class="bad">Read failed: '+e.message+'</span>'); return; }

  const io = doc.inlineObjects || {};
  const ids = Object.keys(io);
  log('Doc read. Title: <b>'+ (doc.title||'(untitled)') +'</b>. Inline objects found: <b>'+ids.length+'</b>.');

  if(!ids.length){ log('<span class="warn">No inline objects in this Doc. If the images are there visually, they may be positioned rather than inline, which is a different case worth knowing.</span>'); return; }

  // show the raw shape of the first embedded object, so we can see what we are dealing with
  const firstEO = (io[ids[0]].inlineObjectProperties||{}).embeddedObject || {};
  log('<h3>Shape of the first embedded object</h3><pre>'+esc(JSON.stringify(trimEO(firstEO),null,2))+'</pre>');

  let haveUri=0, fetched=0, failed=0, tainted=0;
  for(let i=0;i<ids.length;i++){
    const eo=(io[ids[i]].inlineObjectProperties||{}).embeddedObject||{};
    const ip=eo.imageProperties||{};
    const uri=ip.contentUri||null;
    const box=eo.size||{};
    const w=box.width&&box.width.magnitude, h=box.height&&box.height.magnitude;
    const ar = (w&&h)? (w/h).toFixed(3) : '?';
    const d=log('<h3>Image '+(i+1)+' <span class="k">('+ids[i].slice(0,18)+'…)</span></h3>'+
      '<div class="k">declared size: '+(w?Math.round(w):'?')+' × '+(h?Math.round(h):'?')+' pt · aspect '+ar+'</div>'+
      '<div>contentUri: '+(uri?'<span class="ok">present</span>':'<span class="bad">absent</span>')+'</div>');
    if(!uri) continue;
    haveUri++;
    d.innerHTML += '<div class="k" style="margin-top:6px">uri: <code>'+esc(uri.slice(0,90))+'…</code></div>';
    // attempt the fetch
    try{
      const ir=await fetch(uri, {headers:{Authorization:'Bearer '+token}});
      if(!ir.ok){
        // retry without auth header, some contentUris are pre-signed and reject the header
        const ir2=await fetch(uri);
        if(!ir2.ok){ d.innerHTML+='<div class="bad">fetch failed: '+ir.status+' (with token) / '+ir2.status+' (without)</div>'; failed++; continue; }
        var blob=await ir2.blob();
      } else {
        var blob=await ir.blob();
      }
      const url=URL.createObjectURL(blob);
      d.innerHTML+='<div class="ok">fetched: '+Math.round(blob.size/1024)+' KB · '+blob.type+'</div>';
      const img=document.createElement('img'); img.className='thumb'; img.src=url; d.appendChild(img);
      fetched++;
    }catch(e){
      // a CORS failure throws here rather than returning a bad status
      d.innerHTML+='<div class="bad">fetch threw: '+e.message+'</div><div class="k">this is very likely a CORS block, which means the page cannot read the pixels directly even though the URL exists.</div>';
      tainted++;
    }
  }

  const s=document.getElementById('summary');
  s.style.display='block';
  s.innerHTML='<b>Summary.</b> '+ids.length+' images. '+
    haveUri+' had a contentUri. '+
    '<span class="ok">'+fetched+' fetched cleanly</span>. '+
    (failed?'<span class="bad">'+failed+' failed on status</span>. ':'')+
    (tainted?'<span class="bad">'+tainted+' blocked (CORS)</span>. ':'')+
    '<div style="margin-top:8px" class="k">'+verdict(fetched, ids.length, tainted, failed)+'</div>';
}

function verdict(fetched, total, tainted, failed){
  if(fetched===total) return 'Clean sweep. The compositor can pull every image directly from the Doc. This is the good world.';
  if(tainted>0) return 'Some images are blocked by CORS. The URL exists but the page cannot read the pixels. This means the compositor needs another route to the image data, most likely the Drive API rather than the Doc contentUri, or a small proxy. Worth knowing now rather than later.';
  if(failed>0) return 'Some fetches failed on status. The URIs may be expiring or need different credentials. We would look at whether a fresh read gives fresh URIs, and how long they last.';
  return 'Mixed result, worth reading case by case above.';
}

function trimEO(eo){
  // shorten the contentUri in the shown structure so the shape is readable
  const c=JSON.parse(JSON.stringify(eo));
  if(c.imageProperties&&c.imageProperties.contentUri) c.imageProperties.contentUri=c.imageProperties.contentUri.slice(0,60)+'…';
  return c;
}
function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
</script>
</body>
</html>
